<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Movie Maker</title>
    <script src="https://cdn.keepwork.com/keepwork/cdn/tailwindcss@3.4.16.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-base: #0a0a0f; --bg-sidebar: #0d0d14; --bg-card: #13131f;
            --bg-pill: #1a1a2e; --bg-pill-hover: #1e1e2e;
            --border: #1a1a2e; --border-card: #1e1e30;
            --text-primary: #e0e0e0; --text-secondary: #888;
            --text-muted: #555; --text-faint: #444;
            --scrollbar: #333; --scrollbar-hover: #555;
            --placeholder: #555; --topbar-bg: rgba(13,13,20,0.5);
            --input-bg: #0a0a14; --accent: #6366f1; --accent-light: #a5b4fc;
        }
        body.light {
            --bg-base: #f0f2f5; --bg-sidebar: #ffffff; --bg-card: #ffffff;
            --bg-pill: #e8eaf0; --bg-pill-hover: #dde0ea;
            --border: #e0e3ec; --border-card: #dde0ea;
            --text-primary: #1a1a2e; --text-secondary: #555;
            --text-muted: #888; --text-faint: #aaa;
            --scrollbar: #ccc; --scrollbar-hover: #aaa;
            --placeholder: #aaa; --topbar-bg: rgba(255,255,255,0.8);
            --input-bg: #f8f9fc;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: var(--bg-base); color: var(--text-primary); height: 100vh; overflow: hidden; transition: background 0.3s, color 0.3s; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.4s ease-out; }

        .topbar { background: var(--topbar-bg); border-bottom: 1px solid var(--border); backdrop-filter: blur(8px); }
        .topbar-brand { min-width: 0; flex-shrink: 0; white-space: nowrap; }
        .topbar-context { min-width: 0; display: flex; align-items: center; justify-content: center; gap: 8px; white-space: nowrap; overflow: visible; flex-wrap: nowrap; }
        .topbar-actions { justify-self: end; display: flex; align-items: center; gap: 8px; flex-shrink: 0; white-space: nowrap; }
        .topbar-nav-link { border: none; background: transparent; color: var(--accent-light); font-size: 13px; font-weight: 600; cursor: pointer; padding: 0; white-space: nowrap; flex-shrink: 0; }
        .topbar-nav-link:hover { color: white; }
        .topbar-divider { color: var(--text-faint); font-size: 12px; flex-shrink: 0; }
        .topbar-project-title { max-width: min(42vw, 560px); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 14px; font-weight: 600; color: var(--text-primary); }
        .topbar-project-input { max-width: min(42vw, 560px); background: transparent; border: none; border-bottom: 1px solid transparent; color: var(--text-primary); font-size: 14px; font-weight: 600; padding: 2px 0; }
        .topbar-project-input:focus { outline: none; border-bottom-color: var(--accent); }
        .sidebar { background: var(--bg-sidebar); border-right: 1px solid var(--border); }

        .spinner { width: 20px; height: 20px; border: 2px solid var(--scrollbar); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }

        .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 10px; font-size: 14px; z-index: 1000; animation: fadeIn 0.3s ease-out; max-width: 400px; }
        .toast-success { background: #065f46; color: #6ee7b7; border: 1px solid #10b981; }
        .toast-error { background: #7f1d1d; color: #fca5a5; border: 1px solid #ef4444; }
        .toast-info { background: #1e1b4b; color: #a5b4fc; border: 1px solid #6366f1; }

        .modal-input { background: var(--input-bg); border: 1px solid var(--border-card); color: var(--text-primary); border-radius: 8px; padding: 10px 12px; font-size: 14px; width: 100%; transition: border-color 0.2s; }
        .modal-input:focus { outline: none; border-color: var(--accent); }
        textarea.modal-input { resize: vertical; min-height: 80px; }

        /* Preset combo: input + dropdown button */
        .preset-combo { position: relative; display: flex; align-items: stretch; }
        .preset-combo .modal-input { border-top-right-radius: 0; border-bottom-right-radius: 0; flex: 1; min-width: 0; }
        .preset-combo-btn { background: var(--bg-pill); border: 1px solid var(--border-card); border-left: none; border-radius: 0 8px 8px 0; padding: 0 8px; cursor: pointer; display: flex; align-items: center; color: var(--text-muted); transition: color 0.2s, background 0.2s; flex-shrink: 0; }
        .preset-combo-btn:hover { color: var(--accent-light); background: var(--bg-pill-hover); }
        .preset-combo-btn svg { width: 14px; height: 14px; }
        .preset-dropdown { display: none; position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 10px; margin-top: 4px; max-height: 220px; overflow-y: auto; z-index: 600; box-shadow: 0 8px 30px rgba(0,0,0,0.25); }
        .preset-dropdown.open { display: block; }
        .preset-dropdown-item { padding: 7px 12px; font-size: 12px; color: var(--text-secondary); cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .preset-dropdown-item:hover { background: var(--bg-pill); color: var(--accent-light); }

        .btn-primary { background: var(--accent); color: white; border: none; border-radius: 10px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary:hover { opacity: 0.85; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary { background: var(--bg-pill); color: var(--text-secondary); border: 1px solid var(--border-card); border-radius: 10px; padding: 8px 16px; font-size: 13px; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
        .btn-secondary:hover { border-color: var(--accent); color: var(--accent-light); }
        .btn-danger { background: #7f1d1d; color: #fca5a5; border: 1px solid #ef4444; border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; }
        .btn-danger:hover { opacity: 0.85; }

        /* GenImage modal */
        .genimg-ratio-btn { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 8px 10px; min-width: 48px; border-radius: 8px; border: 1px solid var(--border-card); background: var(--bg-pill); color: var(--text-muted); cursor: pointer; font-size: 11px; transition: all 0.15s; }
        .genimg-ratio-btn:hover { border-color: var(--accent); color: var(--accent-light); }
        .genimg-ratio-btn.active { border-color: var(--accent); background: rgba(99,102,241,0.15); color: var(--accent-light); }
        .genimg-ratio-icon { font-size: 16px; line-height: 1; }
        .genimg-ratio-label { font-size: 10px; }
        .genimg-res-btn { flex: 1; padding: 10px 16px; border-radius: 10px; border: 1px solid var(--border-card); background: var(--bg-pill); color: var(--text-secondary); cursor: pointer; font-size: 13px; text-align: center; transition: all 0.15s; }
        .genimg-res-btn:hover { border-color: var(--accent); color: var(--accent-light); }
        .genimg-res-btn.active { border-color: var(--accent); background: rgba(99,102,241,0.15); color: var(--accent-light); font-weight: 600; }
        .genimg-dim-value { background: var(--bg-pill); border: 1px solid var(--border-card); border-radius: 8px; padding: 6px 16px; font-size: 14px; font-weight: 600; color: var(--text-primary); min-width: 80px; text-align: center; display: inline-block; }

        .card { background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 14px; padding: 16px; transition: transform 0.2s, box-shadow 0.2s; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        .card-flat { background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 12px; padding: 14px; }

        .status-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .status-pending  { background: var(--bg-pill); color: var(--text-muted); }
        .status-idle     { background: var(--bg-pill); color: var(--text-muted); }
        .status-running  { background: rgba(99,102,241,0.15); color: #818cf8; }
        .status-succeeded { background: rgba(16,185,129,0.15); color: #6ee7b7; }
        .status-failed   { background: rgba(239,68,68,0.15); color: #fca5a5; }
        .status-editing  { background: rgba(251,191,36,0.15); color: #fcd34d; }
        .status-analyzing { background: rgba(99,102,241,0.15); color: #818cf8; }
        .status-generating { background: rgba(99,102,241,0.15); color: #818cf8; }
        .status-completed { background: rgba(16,185,129,0.15); color: #6ee7b7; }

        /* Pipeline stage badge + dropdown */
        .stats-hover-tooltip { position: fixed; z-index: 900; background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 10px; padding: 10px 14px; min-width: 180px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); pointer-events: auto; animation: fadeIn 0.15s ease-out; }
        .pipeline-badge-wrap { position: relative; margin-left: 12px; flex-shrink: 0; }
        .pipeline-badge-btn { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; border: none; transition: opacity 0.2s; }
        .pipeline-badge-btn:hover { opacity: 0.85; }
        .pipeline-badge-btn svg { width: 10px; height: 10px; }
        .pipeline-dropdown { display: none; position: fixed; background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 10px; padding: 6px 0; min-width: 170px; box-shadow: 0 8px 30px rgba(0,0,0,0.25); z-index: 500; }
        .pipeline-dropdown.open { display: block; }
        .pipeline-dropdown-item { display: flex; align-items: center; gap: 6px; padding: 6px 14px; font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
        .pipeline-dropdown-item.done { color: #6ee7b7; }
        .pipeline-dropdown-item.active { color: var(--accent-light); font-weight: 600; background: var(--bg-pill); }
        .pipeline-dropdown-item .pip-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; background: var(--text-faint); }
        .pipeline-dropdown-item.done .pip-dot { background: #6ee7b7; }
        .pipeline-dropdown-item.active .pip-dot { background: var(--accent-light); }

        /* Preflight issues */
        .preflight-issue { display: flex; align-items: flex-start; gap: 8px; padding: 8px 12px; border-radius: 8px; font-size: 12px; margin-bottom: 6px; }
        .preflight-issue.p0 { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
        .preflight-issue.p1 { background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.3); }
        .preflight-issue.p2 { background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.3); }

        /* Clip Editor */
        .clipeditor { display: flex; flex-direction: row; height: 100%; gap: 0; position: relative; }
        .clipeditor-content { display: flex; flex-direction: column; flex: 1; min-width: 0; gap: 10px; }
        .clipeditor-main { display: flex; gap: 10px; flex: 1; min-height: 0; }
        .clipeditor-stage-wrap { flex: 1; min-width: 0; display: flex; flex-direction: column; }
        .clipeditor-stage { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; background: #000; border-radius: 10px; overflow: hidden; position: relative; }
        .clipeditor-canvas { max-width: 100%; max-height: 100%; display: block; border-radius: 10px; }
        .clipeditor-controls { display: flex; align-items: center; gap: 10px; padding: 10px 0; flex-wrap: wrap; }
        .clipeditor-btn { background: var(--bg-pill); color: var(--text-secondary); border: 1px solid var(--border-card); border-radius: 8px; width: 34px; height: 34px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color 0.2s; }
        .clipeditor-btn:hover { border-color: var(--accent); color: var(--accent-light); }
        .clipeditor-btn-sm { background: var(--bg-pill); color: var(--text-secondary); border: 1px solid var(--border-card); border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; }
        .clipeditor-btn-sm:hover { border-color: var(--accent); color: var(--accent-light); }
        .clipeditor-time { font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
        .clipeditor-label { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
        .clipeditor-select { background: var(--bg-pill); color: var(--text-secondary); border: 1px solid var(--border-card); border-radius: 6px; padding: 4px 8px; font-size: 12px; cursor: pointer; }
        .clipeditor-zoom-val { font-size: 11px; color: var(--text-muted); width: 28px; text-align: right; font-variant-numeric: tabular-nums; }

        /* Inspector */
        .clipeditor-inspector { width: 280px; flex-shrink: 0; background: var(--bg-pill); border: 1px solid var(--border-card); border-radius: 10px; padding: 10px; overflow-y: auto; font-size: 12px; color: var(--text-secondary); }
        .ce-insp-empty { color: var(--text-muted); font-size: 12px; line-height: 1.6; padding: 20px 4px; text-align: left; }
        .ce-insp-empty ul { padding-left: 16px; margin-top: 6px; }
        .ce-insp-title { font-weight: 600; color: var(--text-primary); margin-bottom: 8px; font-size: 13px; }
        .ce-insp-section { margin: 10px 0 4px; font-size: 11px; color: var(--text-muted); border-top: 1px solid var(--border-card); padding-top: 6px; }
        .ce-insp-hint { font-size: 10px; color: var(--text-faint); margin-top: 4px; }
        .ce-insp-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
        .ce-insp-row label:first-child { width: 50px; flex-shrink: 0; color: var(--text-muted); font-size: 11px; }
        .ce-insp-row input, .ce-insp-row select, .ce-insp-row textarea { flex: 1; min-width: 0; background: rgba(0,0,0,0.2); color: var(--text-secondary); border: 1px solid var(--border-card); border-radius: 4px; padding: 3px 6px; font-size: 11px; font-family: inherit; }
        .ce-insp-row input[type="color"] { padding: 0; height: 24px; width: 36px; flex: 0 0 auto; cursor: pointer; }
        .ce-insp-row input[type="range"] { padding: 0; }
        .ce-insp-row textarea { resize: vertical; }
        .ce-insp-val { font-size: 10px; color: var(--text-faint); min-width: 32px; text-align: right; font-variant-numeric: tabular-nums; }
        .ce-insp-chk { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-secondary); cursor: pointer; }
        .ce-insp-actions { display: flex; gap: 6px; margin-top: 10px; }

        /* Timeline */
        .clipeditor-tlwrap { display: flex; height: 240px; flex-shrink: 0; background: var(--bg-pill); border: 1px solid var(--border-card); border-radius: 10px; overflow: hidden; }
        .clipeditor-tlhead-col { width: 160px; flex-shrink: 0; background: rgba(0,0,0,0.2); border-right: 1px solid var(--border-card); overflow: hidden; }
        .clipeditor-tlbody { flex: 1; min-width: 0; overflow-x: auto; overflow-y: hidden; position: relative; }
        .ce-tlhead-spacer { background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border-card); position: relative; overflow: visible; z-index: 20; }

        /* Add track dropdown */
        .ce-add-track-wrap { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); z-index: 21; }
        .ce-add-track-btn { background: rgba(99,102,241,0.3); border: 1px solid rgba(99,102,241,0.5); color: var(--accent-light); border-radius: 4px; padding: 0 6px; font-size: 13px; cursor: pointer; line-height: 16px; font-weight: bold; }
        .ce-add-track-btn:hover { background: rgba(99,102,241,0.5); }
        .ce-add-track-menu { display: none; position: absolute; top: 100%; right: 0; background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.4); min-width: 130px; z-index: 100; overflow: hidden; }
        .ce-add-track-menu-open { display: block; }
        .ce-add-track-item { padding: 6px 12px; font-size: 12px; color: var(--text-secondary); cursor: pointer; white-space: nowrap; }
        .ce-add-track-item:hover { background: rgba(99,102,241,0.2); color: var(--accent-light); }

        /* Context menu */
        .ce-context-menu { position: fixed; background: var(--bg-card); border: 1px solid var(--border-card); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); min-width: 140px; z-index: 10000; overflow: hidden; padding: 4px 0; }
        .ce-context-item { padding: 6px 14px; font-size: 12px; color: var(--text-secondary); cursor: pointer; white-space: nowrap; }
        .ce-context-item:hover { background: rgba(99,102,241,0.2); color: var(--accent-light); }
        .ce-context-divider { height: 1px; background: var(--border-card); margin: 4px 8px; }

        /* Line editor */
        .ce-line-editor { border: 1px solid var(--border-card); border-radius: 6px; padding: 4px 6px; margin-bottom: 6px; background: rgba(0,0,0,0.15); }
        .ce-line-style-row { gap: 4px; flex-wrap: wrap; }
        .ce-line-style-row select { width: 70px; flex: 0 0 auto; }
        .ce-line-style-row input[type="number"] { width: 42px; flex: 0 0 auto; }
        .ce-tlhead { display: flex; flex-direction: column; justify-content: center; gap: 2px; padding: 4px 8px; border-bottom: 1px solid var(--border-card); font-size: 11px; color: var(--text-secondary); }
        .ce-tlhead-video { background: rgba(99,102,241,0.1); font-weight: 600; }
        .ce-tlhead-name { color: var(--text-secondary); }
        .ce-tlhead-row { display: flex; align-items: center; gap: 4px; }
        .ce-tlhead-actions { gap: 2px; }
        .ce-th-name { flex: 1; min-width: 0; background: transparent; border: 1px solid transparent; color: var(--text-secondary); font-size: 11px; padding: 1px 4px; border-radius: 3px; }
        .ce-th-name:hover, .ce-th-name:focus { border-color: var(--border-card); background: rgba(0,0,0,0.2); outline: none; }
        .ce-th-eye { background: transparent; border: none; color: var(--text-secondary); cursor: pointer; font-size: 12px; padding: 0 2px; }
        .ce-th-btn { background: rgba(0,0,0,0.2); border: 1px solid var(--border-card); color: var(--text-secondary); border-radius: 4px; padding: 1px 5px; font-size: 11px; cursor: pointer; }
        .ce-th-btn:hover { border-color: var(--accent); color: var(--accent-light); }
        .ce-th-btn-danger:hover { border-color: #ef4444; color: #fca5a5; }
        .clipeditor-tlruler { position: relative; height: 22px; background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border-card); cursor: pointer; }
        .ce-tick { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.1); }
        .ce-tick-major { background: rgba(255,255,255,0.25); }
        .ce-tick-label { position: absolute; top: 2px; left: 4px; font-size: 9px; color: var(--text-muted); white-space: nowrap; pointer-events: none; }
        .clipeditor-tllanes { position: relative; }
        .ce-lane { position: relative; border-bottom: 1px solid var(--border-card); }
        .ce-lane-video { background: rgba(99,102,241,0.05); }
        .ce-lane-sub { background: rgba(0,0,0,0.1); }
        .ce-lane-text { background: rgba(168,85,247,0.08); }
        .ce-text-block { background: rgba(168,85,247,0.3); border-color: rgba(168,85,247,0.6); }
        .ce-text-block:hover { background: rgba(168,85,247,0.45); }
        .ce-text-block.ce-sub-block-selected { outline-color: #a855f7; }
        .ce-clip { position: absolute; top: 4px; bottom: 4px; background: rgba(99,102,241,0.35); border: 1px solid rgba(99,102,241,0.6); border-radius: 4px; cursor: grab; user-select: none; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .ce-clip:hover { background: rgba(99,102,241,0.5); }
        .ce-clip-current { outline: 2px solid var(--accent); outline-offset: -2px; }
        .ce-clip-selected { background: rgba(99,102,241,0.6); }
        .ce-clip-empty { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15); }
        .ce-clip-trimmed { background: rgba(245,158,11,0.35); border-color: rgba(245,158,11,0.6); }
        .ce-clip-trimmed:hover { background: rgba(245,158,11,0.5); }
        .ce-clip-label { font-size: 10px; font-weight: 600; color: var(--text-secondary); pointer-events: none; padding: 0 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ce-clip-handle { position: absolute; top: 0; bottom: 0; width: 6px; cursor: ew-resize; background: rgba(0,0,0,0.2); }
        .ce-clip-handle-l { left: 0; border-right: 1px solid rgba(255,255,255,0.1); }
        .ce-clip-handle-r { right: 0; border-left: 1px solid rgba(255,255,255,0.1); }
        .ce-clip-handle:hover { background: var(--accent); }
        .ce-clip-choice-zone {
            position: absolute; top: 0; bottom: 0; right: 6px;
            background: linear-gradient(90deg, rgba(236,72,153,0.0), rgba(236,72,153,0.75));
            border-left: 2px solid rgba(236,72,153,0.9);
            cursor: pointer; z-index: 2;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .ce-clip-choice-zone:hover {
            background: linear-gradient(90deg, rgba(236,72,153,0.2), rgba(236,72,153,0.95));
        }
        .ce-clip-choice-zone-icon {
            font-size: 11px; color: #fff; font-weight: 700;
            text-shadow: 0 1px 2px rgba(0,0,0,0.6); pointer-events: none;
        }

                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </div>
            <div id="helpBtn" class="w-8 h-8 rounded-lg flex items-center justify-center cursor-pointer" style="color:var(--text-muted)" title="帮助">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            </div>
            <div id="themeBtn" class="w-8 h-8 rounded-lg flex items-center justify-center cursor-pointer" style="color:var(--text-muted)" title="Toggle theme">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Top Bar -->
            <div class="topbar h-12 grid items-center px-6" style="grid-template-columns:auto 1fr auto;gap:16px">
                <div class="topbar-brand flex items-center gap-3">
                    <button id="mobileHamburger" class="mobile-hamburger" title="菜单">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                    <div class="file-menu-wrap">
                        <button id="fileMenuBtn" class="file-menu-btn">文件 <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg></button>
                        <div id="fileMenuDropdown" class="file-menu-dropdown">
                            <button id="menuNewProjectBtn" class="file-menu-item">📄 新建项目…</button>
                            <button id="menuOpenProjectBtn" class="file-menu-item">📂 打开项目…</button>
                            <button id="menuImportLocalBtn" class="file-menu-item">📥 从本地导入…</button>
                            <button id="menuExportLocalBtn" class="file-menu-item disabled">📦 导出到本地…</button>
                            <button id="menuLocalModeBtn" class="file-menu-item disabled">📍 本地模式</button>
                            <div class="file-menu-divider"></div>
                            <button id="menuBackupBtn" class="file-menu-item disabled">💾 备份</button>
                            <button id="menuRollbackBtn" class="file-menu-item disabled">⏪ 回滚</button>
                            <div class="file-menu-divider"></div>
                            <button id="menuWorkspaceBtn" class="file-menu-item disabled">🗂️ 工作区文件</button>
                            <div class="file-menu-divider"></div>
                            <button id="menuSettingsBtn" class="file-menu-item">⚙️ 设置…</button>
                        </div>
                    </div>
                    <div class="topbar-undo-redo">
                        <button id="undoBtn" title="撤销 (Ctrl+Z)" disabled>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10h13a4 4 0 0 1 0 8H7"/><polyline points="7 6 3 10 7 14"/></svg>
                        </button>
                        <button id="redoBtn" title="重做 (Ctrl+Shift+Z)" disabled>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10H8a4 4 0 0 0 0 8h9"/><polyline points="17 6 21 10 17 14"/></svg>
                        </button>
                    </div>
                    <span id="viewBadge" class="text-xs px-2 py-0.5 rounded" style="color:var(--text-muted);background:var(--bg-pill)">项目列表</span>
                </div>
                <div id="topbarContext" class="topbar-context hidden">
                    <button id="topbarLoadProjectBtn" class="topbar-nav-link" style="display:none">加载项目</button>
                    <div id="topbarProjectTitleHost" class="min-w-0"></div>
                </div>
                <div class="topbar-actions relative">
                    <div id="userProfileBtn" class="user-profile-btn hidden">
                        <div class="avatar" id="userAvatar"></div>
                        <span id="userName" class="text-sm font-medium" style="color:var(--text-primary)"></span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-muted)"><path d="m6 9 6 6 6-6"/></svg>
                    </div>
                    <button id="loginBtn" class="btn-secondary text-xs hidden">登录</button>
                    <div id="profileDropdown" class="profile-dropdown hidden"></div>
                </div>
            </div>

            <!-- View Container -->
            <div id="viewContainer" class="flex-1 overflow-y-auto p-6"></div>
        </div>
    </div>

    <!-- Edit / Regeneration Modal -->
    <div id="editModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center hidden">
        <div class="card-flat fade-in" style="width:540px;max-height:80vh;overflow-y:auto;padding:24px">
            <div class="flex items-center justify-between mb-4">
                <h3 id="editModalTitle" class="text-base font-semibold"></h3>
                <span id="editModalClose" class="cursor-pointer text-xl" style="color:var(--text-muted)">&times;</span>
            </div>
            <div id="editModalBody"></div>
        </div>
    </div>

    <!-- Video Preview Modal -->
    <div id="videoModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center hidden">
        <div class="relative max-w-4xl w-full mx-4 fade-in">
            <button id="videoModalClose" class="absolute -top-10 right-0 text-white/60 hover:text-white text-2xl">&times;</button>
            <video id="videoPreview" controls autoplay class="w-full rounded-xl shadow-2xl" style="max-height:80vh"></video>
        </div>
    </div>

    <!-- Workspace Viewer Modal -->
    <div id="workspaceViewerModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center hidden">
        <div class="card-flat fade-in flex flex-col" style="width:min(1200px,calc(100vw - 32px));height:min(820px,calc(100vh - 32px));padding:18px;gap:14px">
            <div class="flex items-center justify-between gap-4">
                <div>
                    <h3 class="text-base font-semibold" style="color:var(--text-primary)">工作区文件</h3>
                </div>
                <button id="workspaceViewerClose" class="btn-secondary text-xs">关闭</button>
            </div>
            <div id="workspaceViewerHost" class="flex-1" style="min-height:0;border:1px solid var(--border-card);border-radius:10px;overflow:hidden"></div>
        </div>
    </div>

    <!-- Image Preview -->
    <div id="imgPreview" class="img-preview-overlay hidden">
        <img id="imgPreviewSrc" src="">
    </div>

    <!-- Mobile Bottom Bar -->
    <div class="mobile-bottom-bar" id="mobileBottomBar">
        <button class="mob-tab" id="mobTabBreakdown" title="分镜">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>
            <span>分镜</span>
        </button>
        <button class="mob-tab" id="mobTabGenerate" title="生成">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            <span>生成</span>
        </button>
        <button class="mob-tab" id="mobTabPreview" title="预览">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            <span>预览</span>
        </button>
        <button class="mob-tab" id="mobTabMore" title="更多">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
            <span>更多</span>
        </button>
    </div>
    <script type="module">
        const sdkCdnUrl = 'https://cdn.keepwork.com/sdk/keepworkSDK.iife.js?v=20260424x';
        const loadScript = src => new Promise((resolve, reject) => {
            const script = Object.assign(document.createElement('script'), { src, onload: resolve, onerror: reject });
            document.head.appendChild(script);
        });
        const loadSDK = () => window.location.hostname === '127.0.0.1'
            ? import('/keepworkSDK/index.js').catch(() => loadScript(sdkCdnUrl))
            : loadScript(sdkCdnUrl);
        await loadSDK();

        await import('./js/app.js');
    </script>

</body>
</html>
